name: Sync contributions

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update contributions table
        run: |
          python3 - <<'PYEOF'
import base64, json, urllib.request, re

url = "https://lavkesh.com/js/contributions-data.json"
with urllib.request.urlopen(url, timeout=15) as r:
    repos = json.loads(r.read())

MAX_PRS = 12
rows = []
for repo in repos:
    for pr in repo["prs"]:
        link = f"[{repo["org"]}/{repo["repo"]}]({repo["url"]})"
        pr_link = f"[{pr["title"]}]({pr["url"]})"
        rows.append(f"| {link} | {pr_link} |")
        if len(rows) >= MAX_PRS:
            break
    if len(rows) >= MAX_PRS:
        break

table = "| Repo | Contribution |
|------|-------------|
" + "
".join(rows)
new_block = "<!-- OSS_CONTRIBUTIONS_START -->
" + table + "
<!-- OSS_CONTRIBUTIONS_END -->"

readme = open("README.md", encoding="utf-8").read()
updated = re.sub(
    r"<!-- OSS_CONTRIBUTIONS_START -->.*?<!-- OSS_CONTRIBUTIONS_END -->",
    new_block,
    readme,
    flags=re.DOTALL,
)
if updated == readme:
    print("No changes.")
else:
    open("README.md", "w", encoding="utf-8").write(updated)
    print("Updated.")
PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || git commit -am "chore: sync OSS contributions from lavkesh.com"
          git push
